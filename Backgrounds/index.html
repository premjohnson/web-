<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Backgrounds</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS Background Properties</h1>

    <div class="bg-color">
        <h2>Background Color</h2>
        <p>This box uses background-color.</p>
    </div>

    <div class="bg-image">
        <h2>Background Image</h2>
        <p>This box uses a background image.</p>
    </div>

    <div class="bg-repeat">
        <h2>Background Repeat</h2>
        <p>Image repeats multiple times.</p>
    </div>

    <div class="bg-position">
        <h2>Background Position</h2>
        <p>Image is positioned at the center.</p>
    </div>

</body>
</html>
