<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Units Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS Units Example</h1>

    <div class="px-box">
        PX Unit (200px)
    </div>

    <div class="parent">
        Parent Container

        <div class="percent-box">
            % Unit (50%)
        </div>
    </div>

    <div class="em-box">
        EM Unit (2em)
    </div>

    <div class="rem-box">
        REM Unit (2rem)
    </div>

    <div class="vw-box">
        VW Unit (50vw)
    </div>

    <div class="vh-box">
        VH Unit (30vh)
    </div>

</body>
</html>
